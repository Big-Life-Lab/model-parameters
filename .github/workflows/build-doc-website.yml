name: build-doc-website
on: [pull_request]
jobs:
  build-doc-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.1.2'
      - uses: r-lib/actions/setup-r-dependencies@v2
      - run: Rscript -e 'bookdown::render_book("./Rmd")'
  
